<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Rejestracja – Unity House</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Twój system -->
    <script src="system.js" defer></script>

    <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

<div class="login-container">
    <h2 class="login-title">Rejestracja mieszkańca</h2>

    <form id="registerForm">

        <label for="loginInput">Login</label>
        <input type="text" id="loginInput" required>

        <label for="nameInput">Imię i nazwisko</label>
        <input type="text" id="nameInput" required>

        <label for="addressInput">Adres zamieszkania</label>
        <input type="text" id="addressInput" required>

        <label for="phoneInput">Telefon</label>
        <input type="text" id="phoneInput" required>

        <label for="passwordInput">Hasło</label>
        <input type="password" id="passwordInput" required>

        <button type="submit" class="btn gold big" style="width:100%;">Utwórz konto</button>
    </form>

    <div class="login-links">
        <a href="login.html" class="register-link">Masz już konto? Zaloguj się</a>
    </div>

    <p class="login-footer">
        © <span id="year"></span> Unity House Gostyń
    </p>
</div>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const login = document.getElementById("loginInput").value.trim();
    const name = document.getElementById("nameInput").value.trim();
    const address = document.getElementById("addressInput").value.trim();
    const phone = document.getElementById("phoneInput").value.trim();
    const password = document.getElementById("passwordInput").value.trim();

    if (!login || !name || !address || !phone || !password) {
        alert("Uzupełnij wszystkie pola.");
        return;
    }

    const { data, error } = await client
        .from("users")
        .insert({
            login,
            name,
            address,
            phone,
            password
        });

    if (error) {
        console.error(error);
        alert("Nie udało się utworzyć konta.");
        return;
    }

    alert("Konto zostało utworzone. Możesz się zalogować.");
    window.location.href = "login.html";
});
</script>

</body>
</html>
