<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel mieszkańca – Unity House</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Supabase (musi być pierwsze!) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Twój system -->
    <script src="system.js" defer></script>

    <link rel="stylesheet" href="style.css">
</head>

<body class="resident-body">

<header class="resident-header">
    <h2>Panel mieszkańca</h2>
    <button onclick="logout()" class="btn small red">Wyloguj</button>
</header>

<main class="resident-main">

    <section id="ticketsSection" class="resident-section">
        <p>Ładowanie panelu zgłoszeń...</p>
    </section>

</main>

<!-- TEN SKRYPT MUSI BYĆ NA SAMYM KOŃCU -->
<script defer>
document.addEventListener("DOMContentLoaded", async () => {

    const login = localStorage.getItem("userLogin");

    if (!login) {
        window.location.href = "login.html";
        return;
    }

    // Pobieramy dane mieszkańca z Supabase
    const { data: user, error } = await supabase
        .from("users")
        .select("*")
        .eq("login", login)
        .single();

    if (error || !user) {
        alert("Błąd: użytkownik nie istnieje.");
        logout();
        return;
    }

    initResidentTickets(user);
});
</script>

</body>
</html>
