<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel administratora – Unity House</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Supabase (musi być pierwsze!) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Twój system -->
    <script src="system.js" defer></script>

    <link rel="stylesheet" href="style.css">
</head>

<body class="admin-body">

<header class="admin-header">
    <h2>Panel administratora</h2>
    <button onclick="logout()" class="btn small red">Wyloguj</button>
</header>

<main class="admin-main">

    <section class="admin-section">
        <h3>Wszystkie zgłoszenia</h3>
        <div id="adminTicketsList" class="tickets-box">
            <p>Ładowanie zgłoszeń...</p>
        </div>
    </section>

</main>

<!-- SKRYPT MUSI BYĆ NA SAMYM KOŃCU I Z DEFER -->
<script defer>
document.addEventListener("DOMContentLoaded", async () => {

    const isAdmin = localStorage.getItem("adminLogged");

    if (!isAdmin) {
        window.location.href = "login.html";
        return;
    }

    // Ładujemy zgłoszenia admina
    const list = document.getElementById("adminTicketsList");
    list.innerHTML = "<p>Ładowanie zgłoszeń...</p>";

    const { data, error } = await supabase
        .from("tickets")
        .select("*, users(login)")
        .order("created_at", { ascending: false });

    if (error) {
        console.error(error);
        list.innerHTML = "<p>Błąd ładowania zgłoszeń.</p>";
        return;
    }

    if (!data || data.length === 0) {
        list.innerHTML = "<p>Brak zgłoszeń.</p>";
        return;
    }

    list.innerHTML = data.map(t => `
        <div class="ticket-item">
            <h4>${t.title}</h4>
            <p>${t.description}</p>
            <p><b>Użytkownik:</b> ${t.users?.login || "Nieznany"}</p>
            <span class="status">${t.status}</span>
        </div>
    `).join("");
});
</script>

</body>
</html>
