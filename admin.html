<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel administratora – Unity House</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Supabase (musi być pierwsze!) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Twój system -->
    <script src="system.js" defer></script>

    <link rel="stylesheet" href="style.css">
</head>

<body class="admin-body">

<header class="admin-header">
    <h2>Panel administratora</h2>
    <button onclick="logout()" class="btn small red">Wyloguj</button>
</header>

<main class="admin-main">

    <section class="admin-section">
        <h3>Wszystkie zgłoszenia</h3>
        <div id="adminTicketsList" class="tickets-box">
            <p>Ładowanie zgłoszeń...</p>
        </div>
    </section>

</main>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const isAdmin = localStorage.getItem("adminLogged");

    if (!isAdmin) {
        window.location.href = "login.html";
        return;
    }

    initAdminTickets();
});
</script>

</body>
</html>
